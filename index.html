<body style="text-align:center;padding-top:60px;font-size:18px;">

    <button onclick="goMini()" style="margin-top:30px;padding:12px 25px;background:#07c160;color:#fff;border-radius:6px;border:0;font-size:16px;">
        点击进入小程序
    </button>

<script>
function goMini(){

    let url = "weixin://dl/business/?appid=wx3118029a5659fea6&env_version=develop";
    location.href = url;
}
// 页面加载后自动尝试跳转，也可以手动点击按钮
